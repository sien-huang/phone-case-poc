name: CI/CD Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # Job 1: Code Quality & Static Analysis
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔍 Run ESLint
        run: npx eslint . --ext .ts,.tsx --max-warnings=0
        continue-on-error: false

      - name: 🔍 Run TypeScript type check
        run: npm run type-check
        continue-on-error: false

  # Job 2: Unit & Integration Tests
  unit-tests:
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🧪 Run unit & integration tests
        run: npm run test:coverage

      - name: 📊 Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/coverage-final.json
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: true

      - name: 🧹 Enforce coverage thresholds
        run: |
          COVERAGE=$(grep -oP 'Lines\s*:\s*\K[0-9.]+' coverage/lcov-report/index.html | head -1)
          echo "Lines coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 80" | bc -l) )); then
            echo "❌ Coverage threshold not met: ${COVERAGE}% < 80%"
            exit 1
          fi
          echo "✅ Coverage threshold met: ${COVERAGE}% ≥ 80%"

  # Job 3: E2E Tests with Playwright
  e2e-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🎭 Install Playwright browsers
        run: npx playwright install --with-deps

      - name: 🗄️ Setup database
        run: |
          npx prisma generate
          npx prisma migrate deploy
          npx prisma db seed
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test

      - name: 🏗️ Build Next.js app
        run: npm run build

      - name: 🚀 Start server
        run: npm start &
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          NEXTAUTH_SECRET: test-secret
          NEXTAUTH_URL: http://localhost:3000

      - name: ⏳ Wait for server
        run: npx wait-on http://localhost:3000 --timeout-ms=120000

      - name: 🧪 Run Playwright E2E tests
        run: npx playwright test --reporter=html
        env:
          BASE_URL: http://localhost:3000

      - name: 📤 Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/

  # Job 4: Build Verification
  build-check:
    runs-on: ubuntu-latest
    needs: [code-quality, unit-tests, e2e-tests]
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗️ Build Next.js app
        run: npm run build
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          NEXTAUTH_SECRET: test-secret

      - name: 📤 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: .next/

  # Job 5: Security Audit
  security:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci --frozen-lockfile

      - name: 🔐 Run npm audit
        run: npm audit --audit-level moderate
        continue-on-error: true

      - name: 🔐 Check for vulnerable dependencies
        run: |
          VULNERABILITIES=$(npm audit --json | jq '.metadata.vulnerabilities | length')
          if [ "$VULNERABILITIES" -gt 0 ]; then
            echo "❌ Found $VULNERABILITIES vulnerable dependencies"
            npm audit
            exit 1
          fi

  # Job 6: Performance Check (Optional)
  performance:
    runs-on: ubuntu-latest
    needs: build-check
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗️ Build Next.js app
        run: npm run build

      - name: 🚀 Start server
        run: npm start &
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          NEXTAUTH_SECRET: test-secret

      - name: ⏳ Wait for server
        run: npx wait-on http://localhost:3000 --timeout-ms=120000

      - name: 📊 Run Lighthouse CI
        run: |
          npm install -g @lhci/cli
          lhci collect --url=http://localhost:3000 --config=./lighthouserc.js
        continue-on-error: true

      - name: 📤 Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: .lighthouseci/

  # Job 7: Aggregate Status
  status:
    runs-on: ubuntu-latest
    needs: [code-quality, unit-tests, e2e-tests, build-check, security, performance]
    if: always()
    steps:
      - name: ✅ All checks passed
        if: >
          needs.code-quality.result == 'success' &&
          needs.unit-tests.result == 'success' &&
          needs.e2e-tests.result == 'success' &&
          needs.build-check.result == 'success' &&
          needs.security.result == 'success'
        run: |
          echo "✅ All CI checks passed successfully!"
          echo "📊 Coverage: 80%+"
          echo "🧪 Unit Tests: PASSED"
          echo "🌐 E2E Tests: PASSED"
          echo "🏗️ Build: PASSED"
          echo "🔐 Security: PASSED"
          echo "📈 Performance: PASSED"

      - name: ❌ Some checks failed
        if: failure()
        run: |
          echo "❌ Some CI checks failed. Please review the logs above."
          echo "Failed jobs:"
          if [ "${{ needs.code-quality.result }}" != "success" ]; then echo "  - code-quality: ${{ needs.code-quality.result }}"; fi
          if [ "${{ needs.unit-tests.result }}" != "success" ]; then echo "  - unit-tests: ${{ needs.unit-tests.result }}"; fi
          if [ "${{ needs.e2e-tests.result }}" != "success" ]; then echo "  - e2e-tests: ${{ needs.e2e-tests.result }}"; fi
          if [ "${{ needs.build-check.result }}" != "success" ]; then echo "  - build-check: ${{ needs.build-check.result }}"; fi
          if [ "${{ needs.security.result }}" != "success" ]; then echo "  - security: ${{ needs.security.result }}"; fi
          if [ "${{ needs.performance.result }}" != "success" ]; then echo "  - performance: ${{ needs.performance.result }}"; fi
