name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      DATABASE_URL: "file:./dev.db"
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Clean build cache (reduce size)
        run: rm -rf .next/cache

      - name: Apply Database Migrations (if needed)
        run: |
          npx wrangler d1 migrations apply phone_case_poc_db --remote || echo "Migrations already applied or not needed"

      - name: Deploy to Cloudflare Pages
        run: |
          npx wrangler pages deploy ./.next --project-name phone-case-poc

      - name: Get Deployment URL
        run: |
          echo "✅ Deployment successful!"
          # The URL will be printed by wrangler deploy automatically
